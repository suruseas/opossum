# File-based secrets + profile-gated one-off services (mcp-stack shape).
name: tools
secrets:
  gh_token:
    file: ./gh_token.txt
services:
  http-server:
    image: hashicorp/terraform-mcp-server
    command: ["streamable-http", "--transport-host", "0.0.0.0"]
    ports: ["8080:8080"]
  gh:
    image: ghcr.io/github/github-mcp-server
    secrets: [gh_token]
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN_FILE: /run/secrets/gh_token
    profiles: ["stdio"]
