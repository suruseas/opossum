# YAML anchors + merge keys (<<: *anchor) — real projects (Apache Airflow etc.)
# use them heavily for DRY. Each service must inherit the anchored image, env,
# volumes, and depends_on, plus its own overrides. Guards the parser's merge-key
# handling against a future change (e.g. stricter decoding) that would drop it.
name: dry
x-common: &common
  image: apache/airflow:3.0.0
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  volumes:
    - ./dags:/opt/airflow/dags
  depends_on:
    postgres:
      condition: service_healthy
services:
  scheduler:
    <<: *common
    command: ["scheduler"]
  worker:
    <<: *common
    command: ["celery", "worker"]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: airflow
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
volumes:
  db:
