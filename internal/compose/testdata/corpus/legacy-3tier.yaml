# A classic 3-tier with ignored fields (restart, container_name) that must still
# load, mixed env forms, and a bare container port. (awesome-compose nginx-*)
name: classic
services:
  proxy:
    image: nginx:latest
    container_name: my-proxy
    restart: always
    ports:
      - "80:80"
    depends_on: [backend]
  backend:
    image: example/backend:latest
    restart: on-failure
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    expose:
      - "8000"
  db:
    image: mysql:8
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: app
    volumes:
      - dbdata:/var/lib/mysql
volumes:
  dbdata:
