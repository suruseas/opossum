<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <!-- README hero banner (1200x300, transparent outside the rounded card). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20201e"/>
      <stop offset="1" stop-color="#141413"/>
    </linearGradient>
    <clipPath id="card"><rect width="1200" height="300" rx="20"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect width="1200" height="300" fill="url(#bg)"/>

    <!-- opossum mark, scaled down from the social card -->
    <g transform="translate(52,40) scale(0.62)">
      <path d="M300 250 C 400 260, 460 220, 450 160 C 443 118, 396 108, 380 140 C 368 164, 390 186, 412 176"
            fill="none" stroke="#d98da8" stroke-width="26" stroke-linecap="round"/>
      <ellipse cx="185" cy="235" rx="165" ry="115" fill="#8a8a84"/>
      <ellipse cx="255" cy="255" rx="70" ry="60" fill="#7b7b75"/>
      <rect x="95"  y="320" width="30" height="48" rx="14" fill="#4a4a46"/>
      <rect x="160" y="330" width="30" height="42" rx="14" fill="#4a4a46"/>
      <rect x="230" y="330" width="30" height="42" rx="14" fill="#4a4a46"/>
      <path d="M120 150 C 60 160, 8 205, -18 236 C -26 246, -22 258, -8 258 C 40 262, 96 268, 130 262 C 168 254, 176 196, 150 165 C 140 153, 130 148, 120 150 Z"
            fill="#f2f1ea"/>
      <ellipse cx="128" cy="132" rx="34" ry="30" fill="#3d3d3a"/>
      <ellipse cx="132" cy="136" rx="20" ry="17" fill="#d98da8"/>
      <circle cx="52" cy="222" r="11" fill="#141413"/>
      <circle cx="56" cy="218" r="3.5" fill="#ffffff"/>
      <circle cx="-16" cy="248" r="12" fill="#e08bab"/>
    </g>

    <!-- wordmark + tagline -->
    <text x="410" y="138" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1.5">opossum</text>
    <text x="414" y="182" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="24" fill="#c3c2b7">Compose-style orchestration for Apple's container runtime</text>

    <!-- terminal chip -->
    <rect x="414" y="208" width="300" height="52" rx="10" fill="#0d0d0d" stroke="#383835" stroke-width="1.5"/>
    <circle cx="438" cy="234" r="5" fill="#e34948"/>
    <circle cx="455" cy="234" r="5" fill="#fab219"/>
    <circle cx="472" cy="234" r="5" fill="#0ca30c"/>
    <text x="492" y="242" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="21" fill="#0ca30c">$ opossum up</text>

    <!-- footer chip -->
    <text x="760" y="241" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="19" fill="#898781">macOS 26 · runs your docker-compose.yml</text>
  </g>
</svg>
