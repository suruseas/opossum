# Default-deny allowlist forward proxy. Only destinations matching the bind-mounted
# allowlist file are permitted; everything else is refused (403 for HTTP, a refused
# CONNECT for HTTPS). CONNECT-type — it does not decrypt HTTPS (no MITM / no CA to
# install), it only gates by destination host, which is enough to fence egress.
Port 8888
Listen 0.0.0.0
Timeout 600

# The allowlist is a declaration you edit (proxy/allowlist), not baked into the
# image — one host regex per line. FilterDefaultDeny makes "not listed" mean "deny".
Filter "/etc/tinyproxy/allowlist"
FilterDefaultDeny Yes
FilterExtended On

# Permit CONNECT to the standard HTTPS port (agents talk to the API over TLS).
ConnectPort 443
