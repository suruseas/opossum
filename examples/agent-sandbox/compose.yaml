# A disposable workroom for an autonomous coding agent. The whole point of this
# example is that **the compose file is the declaration of what the agent can
# touch**: the bind mount is the files it sees, the env is the secrets it holds,
# and the network is how far it can reach. Everything an agent needs to be boxed
# in is already ordinary compose vocabulary.
#
# Intended use is a one-off:  opossum run --rm agent claude -p "…your task…"
# See the README for the quickstart, the two auth options, and the limits.
name: agent-sandbox

networks:
  # Host-only network for the caged variant below: no direct internet, so the
  # agent's only way out is a host proxy. See the README "Constraining egress".
  caged:
    internal: true

services:
  # The workroom. Reaches the Claude API directly — the simplest thing that runs.
  agent:
    build: .
    user: node # non-root: Claude Code refuses --dangerously-skip-permissions as root
    working_dir: /work
    volumes:
      - ./work:/work # the ONLY host files the agent sees; results land here
    # Default guest RAM (~1 GiB) is tight for node + build + test — give it room.
    mem_limit: 4g
    cpus: 4
    environment:
      # BYO auth — values live in a git-ignored .env, never inline here. Supply
      # ONE of these (see README): a long-term OAuth token from `claude
      # setup-token`, or an API key.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  # An HTTP MCP server, offered to the agent below as a tool. It's an ordinary
  # service on the shared network — nothing special — reachable by name. MVP wiring
  # is HTTP-transport MCP servers (stdio has no cross-container stdin path).
  terraform:
    image: hashicorp/terraform-mcp-server
    command: ["streamable-http", "--transport-host", "0.0.0.0"] # bind all interfaces
    ports:
      # host 8091 (not 8080 — the caged proxy uses that); the normal agent reaches
      # it by network name (container port 8080), the caged agent via host 8091.
      - "8091:8080"
    profiles: ["tools", "caged"] # available to both the normal and caged tool variants

  # The workroom, wired with a tool. Same box as `agent`, plus a declared MCP
  # server: `x-opossum-mcp-tools` names services this agent should use as tools, and
  # opossum generates a `.mcp.json` and mounts it at /run/opossum/mcp.json — no
  # hand-writing URLs. Pass it to Claude Code with `--mcp-config`:
  #   opossum --profile tools run --rm agent-tools \
  #     claude --dangerously-skip-permissions --mcp-config /run/opossum/mcp.json \
  #     -p "use the terraform tools to …"
  # Reuses the image `agent` builds (run `opossum build` first).
  agent-tools:
    image: agent-sandbox-agent:latest
    user: node
    working_dir: /work
    volumes:
      - ./work:/work
    mem_limit: 4g
    cpus: 4
    depends_on: [terraform] # bring the tool server up first (`run` starts dependencies)
    # The tools face of the capability manifest: opossum turns each entry into an
    # HTTP MCP entry (here http://terraform:8080/mcp, reached by name on the network).
    x-opossum-mcp-tools: [terraform]
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    profiles: ["tools"]

  # The allowlist forward proxy: the caged agent's single, enforced exit. It sits
  # on the DEFAULT (internet-facing) network so it can reach the outside, and
  # republishes its port to the host — the caged agent, which has no internet of
  # its own, reaches it via ${OPOSSUM_HOST_GATEWAY}. The allowlist is bind-mounted
  # (proxy/allowlist), so what the agent may reach is declared in this repo, not
  # hidden in an image. Default-deny: edit proxy/allowlist to widen it.
  proxy:
    build: ./proxy
    ports:
      - "8080:8888" # host :8080 -> tinyproxy :8888
    volumes:
      - ./proxy/allowlist:/etc/tinyproxy/allowlist:ro
    profiles: ["caged"]

  # The same workroom, but on a host-only network: the agent has NO direct
  # internet. Its only egress is the `proxy` above, reached at
  # ${OPOSSUM_HOST_GATEWAY}:8080 — so the allowlist is enforced, not merely
  # advised (the internet route is physically gone). Reuses the image `agent`
  # builds (run `opossum build` first). Profiled, so a plain `up`/`run agent`
  # never starts it and its internal network isn't created unless you ask for it:
  #   opossum run --rm agent-caged claude -p "…"
  agent-caged:
    image: agent-sandbox-agent:latest
    user: node
    working_dir: /work
    volumes:
      - ./work:/work
    mem_limit: 4g
    cpus: 4
    networks: [caged]
    depends_on: [proxy, terraform] # bring the exit AND the tool server up first
    # A tool on a caged agent: it has no name resolution and its only internet is
    # the proxy, so the tool is declared as an explicit URL through the host gateway
    # (not a bare service name). NO_PROXY below keeps that tool traffic off the
    # allowlist proxy — the tool is a granted capability, not open internet.
    x-opossum-mcp-tools: ["terraform=http://${OPOSSUM_HOST_GATEWAY}:8091/mcp"]
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # The proxy is the only way out for the INTERNET. With no internet route, the
      # agent can't bypass it — HTTPS (CONNECT) is gated against proxy/allowlist.
      HTTPS_PROXY: http://${OPOSSUM_HOST_GATEWAY}:8080
      HTTP_PROXY: http://${OPOSSUM_HOST_GATEWAY}:8080
      # …but the declared tool at the host gateway is a granted capability, not
      # internet egress, so it bypasses the allowlist proxy.
      NO_PROXY: ${OPOSSUM_HOST_GATEWAY}
    profiles: ["caged"]
